name: Deploy

on:
  push:
    branches: [main]
  workflow_dispatch:

jobs:
  deploy:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      deployments: write
    name: Deploy to Cloudflare Workers
    steps:
      - uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: 'npm'
          cache-dependency-path: '**/package-lock.json'

      - name: Install worker dependencies
        run: |
          cd cloudflare-worker
          npm ci

      - name: Install web dependencies
        run: |
          cd web
          npm ci

      - name: Type check web
        run: |
          cd web
          npx tsc --noEmit

      - name: Build frontend
        run: |
          mkdir -p ../cloudflare-worker/public
          cd web
          npm run build
          cp -r dist/* ../cloudflare-worker/public/

      - name: Deploy to Cloudflare Workers
        uses: cloudflare/wrangler-action@v3
        with:
          apiToken: ${{ secrets.CF_API_TOKEN }}
          workingDirectory: cloudflare-worker
        env:
          GITHUB_CLIENT_ID: ${{ secrets.BLOATH_GITHUB_CLIENT_ID }}
          GITHUB_CLIENT_SECRET: ${{ secrets.BLOATH_GITHUB_CLIENT_SECRET }}
          SESSION_SECRET: ${{ secrets.BLOATH_SESSION_SECRET }}
