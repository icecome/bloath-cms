name: Deploy

on:
  push:
    branches: [main]
  workflow_dispatch:

jobs:
  deploy:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      deployments: write
    name: Deploy to Cloudflare Workers
    steps:
      - uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '22'
          cache: 'npm'
          cache-dependency-path: '**/package-lock.json'

      - name: Install worker dependencies
        run: |
          cd cloudflare-worker
          npm ci

      - name: Install web dependencies
        run: |
          cd web
          npm ci

      - name: Type check web
        run: |
          cd web
          npx tsc --noEmit

      - name: Build frontend
        env:
          VITE_API_URL: https://bloath-cms-worker.api.icecome.com
        run: |
          cd web
          npm run build

      - name: Deploy frontend to Pages
        env:
          CLOUDFLARE_API_TOKEN: ${{ secrets.CF_API_TOKEN }}
          CLOUDFLARE_ACCOUNT_ID: ${{ secrets.CF_ACCOUNT_ID }}
        run: |
          cd cloudflare-worker
          mv wrangler.jsonc wrangler.jsonc.bak
          npx wrangler pages deploy ../web/dist --project-name=bloath-cms-web
          mv wrangler.jsonc.bak wrangler.jsonc

      - name: Deploy to Cloudflare Workers
        uses: cloudflare/wrangler-action@v3
        with:
          apiToken: ${{ secrets.CF_API_TOKEN }}
          accountId: ${{ secrets.CF_ACCOUNT_ID }}
          workingDirectory: cloudflare-worker

      - name: Set Wrangler Secrets
        working-directory: cloudflare-worker
        run: |
          echo "${{ secrets.BLOATH_GITHUB_CLIENT_ID }}" | npx wrangler secret put GITHUB_CLIENT_ID
          echo "${{ secrets.BLOATH_GITHUB_CLIENT_SECRET }}" | npx wrangler secret put GITHUB_CLIENT_SECRET
          echo "${{ secrets.BLOATH_SESSION_SECRET }}" | npx wrangler secret put SESSION_SECRET
          echo "${{ secrets.BLOATH_FRONTEND_URL }}" | npx wrangler secret put FRONTEND_URL
        env:
          CLOUDFLARE_API_TOKEN: ${{ secrets.CF_API_TOKEN }}
          CLOUDFLARE_ACCOUNT_ID: ${{ secrets.CF_ACCOUNT_ID }}
