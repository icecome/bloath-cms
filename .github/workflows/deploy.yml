name: Deploy

on:
  push:
    branches: [main]
  workflow_dispatch:

jobs:
  deploy:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      deployments: write
    name: Deploy to Cloudflare Workers
    steps:
      - uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: 'npm'
          cache-dependency-path: '**/package-lock.json'

      - name: Install worker dependencies
        run: |
          cd cloudflare-worker
          npm ci

      - name: Install web dependencies
        run: |
          cd web
          npm ci

      - name: Type check web
        run: |
          cd web
          npx tsc --noEmit

      - name: Build frontend
        env:
          VITE_API_URL: https://bloath-cms-worker.bloath-cms-worker.bloath-cms.workers.dev
        run: |
          cd web
          npm run build

      - name: Deploy frontend to Cloudflare Pages
        uses: cloudflare/pages-action@v1
        with:
          apiToken: ${{ secrets.CF_API_TOKEN }}
          accountId: ${{ secrets.CF_ACCOUNT_ID }}
          projectName: bloath-cms
          directory: web/dist
          gitHubToken: ${{ secrets.GITHUB_TOKEN }}

      - name: Deploy to Cloudflare Workers
        uses: cloudflare/wrangler-action@v3
        with:
          apiToken: ${{ secrets.CF_API_TOKEN }}
          workingDirectory: cloudflare-worker
        env:
          GITHUB_CLIENT_ID: ${{ secrets.BLOATH_GITHUB_CLIENT_ID }}
          GITHUB_CLIENT_SECRET: ${{ secrets.BLOATH_GITHUB_CLIENT_SECRET }}
          SESSION_SECRET: ${{ secrets.BLOATH_SESSION_SECRET }}
